<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    h1 { color: #032D60; font-size: 28px; }
    h2 { color: #0070D2; font-size: 18px; }
    p { color: #444; font-size: 14px; }
    .tag {
      background: #0070D2;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      margin: 5px;
      display: inline-block;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 HireFlow</h1>
    <h2>Recruitment Management System</h2>
    <p>Streamline your hiring process —<br>
    from job posting to candidate acceptance.</p>
    <br>
    <span class="tag">Jobs</span>
    <span class="tag">Candidates</span>
    <span class="tag">Interviews</span>
    <span class="tag">Assignments</span>
    <span class="tag">Analytics</span>
  </div>
</body>
</html>
